services:
  mfc-combustion-analyzer-simulator-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: mfc-combustion-analyzer-simulator:dev
    container_name: mfc-combustion-analyzer-simulator-dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
